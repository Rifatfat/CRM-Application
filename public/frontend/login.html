<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CRM ISP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="bg-[#242424] p-3 sm:p-5">
    <main class="mx-auto grid min-h-[calc(100vh-2.5rem)] max-w-[1360px] overflow-hidden bg-white shadow-2xl lg:grid-cols-[0.92fr_1.08fr]">
      <section class="flex items-center justify-center px-6 py-12 sm:px-10 lg:px-20">
        <div class="w-full max-w-[292px]">
          <section id="login-panel">
            <h1 class="text-[1.75rem] font-extrabold leading-tight text-black">Hello There!</h1>
            <p class="mt-1 text-sm font-medium text-black/80">Please log in to your account</p>

            <form id="login-form" class="mt-6 space-y-3">
              <div>
                <label class="crm-label !mb-1 !text-[11px]" for="login-email">Email</label>
                <input id="login-email" class="crm-input !min-h-10 !rounded-sm !border-[#999] !px-3 !py-2 !text-xs" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>
              </div>
              <div>
                <label class="crm-label !mb-1 !text-[11px]" for="login-password">Password</label>
                <input id="login-password" class="crm-input !min-h-10 !rounded-sm !border-[#999] !px-3 !py-2 !text-xs" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
              </div>
              <p id="login-error" class="hidden text-xs font-semibold text-[#ff3747]"></p>
              <div class="flex items-center justify-between text-[11px]">
                <label class="flex items-center gap-1.5 text-black/70">
                  <input class="h-3 w-3 rounded border-slate-300 text-[#554cff] focus:ring-[#554cff]" type="checkbox">
                  Remember Me
                </label>
                <button class="font-semibold text-[#554cff]" type="button">Forgot Password?</button>
              </div>
              <button class="btn-primary !mt-5 !min-h-11 w-full !rounded-sm !text-xs" data-label="Login" type="submit">Login</button>
            </form>

            <p class="mt-5 text-center text-[11px] font-medium text-black">
              Don't you have an account?
              <button id="show-register" class="font-semibold text-[#554cff]" type="button">Sign up</button>
            </p>
          </section>

          <section id="register-panel" class="hidden">
            <h1 class="text-[1.75rem] font-extrabold leading-tight text-black">Create Account</h1>
            <p class="mt-1 text-sm font-medium text-black/80">Start managing your client workspace</p>

            <form id="register-form" class="mt-6 space-y-3">
              <div>
                <label class="crm-label !mb-1 !text-[11px]" for="register-name">Name</label>
                <input id="register-name" class="crm-input !min-h-10 !rounded-sm !border-[#999] !px-3 !py-2 !text-xs" name="name" type="text" placeholder="Your name" autocomplete="name" required>
              </div>
              <div>
                <label class="crm-label !mb-1 !text-[11px]" for="register-email">Email</label>
                <input id="register-email" class="crm-input !min-h-10 !rounded-sm !border-[#999] !px-3 !py-2 !text-xs" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>
              </div>
              <div>
                <label class="crm-label !mb-1 !text-[11px]" for="register-password">Password</label>
                <input id="register-password" class="crm-input !min-h-10 !rounded-sm !border-[#999] !px-3 !py-2 !text-xs" name="password" type="password" minlength="6" placeholder="Minimum 6 characters" autocomplete="new-password" required>
              </div>
              <p id="register-error" class="hidden text-xs font-semibold text-[#ff3747]"></p>
              <button class="btn-primary !mt-5 !min-h-11 w-full !rounded-sm !text-xs" data-label="Register" type="submit">Register</button>
            </form>

            <p class="mt-5 text-center text-[11px] font-medium text-black">
              Already registered?
              <button id="show-login" class="font-semibold text-[#554cff]" type="button">Back to login</button>
            </p>
          </section>
        </div>
      </section>

      <section class="hidden bg-cover bg-center lg:block" style="background-image: url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1400&q=85');"></section>
    </main>
    <div id="toast-container" class="fixed right-4 top-4 z-[80] flex w-[min(92vw,420px)] flex-col gap-3"></div>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
