<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History | CRM ISP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <section id="page-content">
      <div class="mb-7 grid grid-cols-1 gap-6 lg:grid-cols-3">
        <article class="metric-card p-5">
          <div class="flex items-center gap-4">
            <span class="icon-tile bg-[#ff3747]">
              <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" aria-hidden="true"><path d="M4 7h16v10H4V7Z" stroke="currentColor" stroke-width="2"/><path d="M8 12h.01M12 12h.01M16 12h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
            </span>
            <div>
              <p class="text-sm font-medium text-[#8aa0b5]">Total Revenue</p>
              <p id="payment-total-revenue" class="mt-2 text-2xl font-extrabold text-black">Rp0</p>
            </div>
          </div>
          <div class="mt-4 h-1.5 rounded-full bg-[#d9d9d9]"><div class="h-full rounded-full bg-[#ff3747]" style="width: 92%"></div></div>
        </article>
        <article class="metric-card p-5">
          <div class="flex items-center gap-4">
            <span class="icon-tile bg-[#35b764]">
              <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" aria-hidden="true"><path d="m6 12 4 4 8-8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <div>
              <p class="text-sm font-medium text-[#8aa0b5]">Paid</p>
              <p id="payment-paid-total" class="mt-2 text-2xl font-extrabold text-[#35b764]">Rp0</p>
            </div>
          </div>
          <div class="mt-4 h-1.5 rounded-full bg-[#d9d9d9]"><div id="payment-paid-bar" class="h-full rounded-full bg-[#35b764]" style="width: 0%"></div></div>
        </article>
        <article class="metric-card p-5">
          <div class="flex items-center gap-4">
            <span class="icon-tile bg-[#ffb44c]">
              <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" aria-hidden="true"><path d="M7 4h10M7 20h10M8 4c0 4 8 4 8 8s-8 4-8 8M16 4c0 4-8 4-8 8s8 4 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <div>
              <p class="text-sm font-medium text-[#8aa0b5]">Pending</p>
              <p id="payment-pending-total" class="mt-2 text-2xl font-extrabold text-[#ffb44c]">Rp0</p>
            </div>
          </div>
          <div class="mt-4 h-1.5 rounded-full bg-[#d9d9d9]"><div id="payment-pending-bar" class="h-full rounded-full bg-[#ffb44c]" style="width: 0%"></div></div>
        </article>
      </div>

      <section class="rounded-lg border border-[#e7ecf2] bg-white">
        <div class="flex justify-end border-b border-[#e7ecf2] p-4">
          <button id="open-payment-modal" class="btn-secondary !min-h-8 !px-3 !py-2" type="button">Quick add</button>
        </div>
        <div class="overflow-x-auto crm-scrollbar">
          <table class="crm-table">
            <thead>
              <tr>
                <th>Client Name</th>
                <th>Deal</th>
                <th>Payment Method</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Status</th>
                <th class="text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="payments-body"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-5 py-4 text-xs font-medium text-[#8aa0b5]">
          <span id="payments-showing">Showing 0 payments</span>
          <div class="flex items-center gap-2 text-[#554cff]">
            <span>&lt;</span><span class="rounded border border-[#e7ecf2] px-2 py-1 text-[#0d2a4c]">1</span><span>&gt;</span>
          </div>
        </div>
      </section>

      <div id="payment-modal" class="modal-backdrop hidden">
        <div class="w-full max-w-2xl rounded-lg border border-[#e7ecf2] bg-white p-6 shadow-2xl">
          <div class="mb-5 flex items-center justify-between">
            <h2 class="text-2xl font-extrabold text-black">Record payment</h2>
            <button id="close-payment-modal" class="btn-ghost !min-h-8 !px-3" type="button">Close</button>
          </div>
          <form id="payment-form" class="grid grid-cols-1 gap-5 md:grid-cols-2">
            <div class="md:col-span-2">
              <label class="crm-label required" for="contract_id">Contract</label>
              <select id="contract_id" class="crm-input" name="contract_id" required></select>
            </div>
            <div>
              <label class="crm-label required" for="amount">Amount</label>
              <input id="amount" class="crm-input" name="amount" type="number" min="0" step="1000" required>
            </div>
            <div>
              <label class="crm-label required" for="payment_date">Payment date</label>
              <input id="payment_date" class="crm-input" name="payment_date" type="date" required>
            </div>
            <div>
              <label class="crm-label required" for="payment_method">Method</label>
              <input id="payment_method" class="crm-input" name="payment_method" type="text" placeholder="Bank transfer" required>
            </div>
            <div>
              <label class="crm-label required" for="status">Status</label>
              <select id="status" class="crm-input" name="status" required>
                <option value="pending">Pending</option>
                <option value="paid">Paid</option>
                <option value="failed">Failed</option>
              </select>
            </div>
            <div class="md:col-span-2 flex justify-end gap-3">
              <button id="close-payment-modal-secondary" class="btn-ghost" type="button">Cancel</button>
              <button class="btn-primary" type="submit">Save</button>
            </div>
          </form>
        </div>
      </div>
    </section>
    <script type="module" src="js/payment.js"></script>
  </body>
</html>
