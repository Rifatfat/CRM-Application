<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document | CRM ISP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <section id="page-content">
      <div class="grid grid-cols-1 gap-6 xl:grid-cols-[0.36fr_1fr]">
        <aside class="space-y-5">
          <label class="relative block">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#b5c0ca]">
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <input class="crm-input !min-h-10 !rounded-lg !border-[#dfe5ed] !pl-10" type="search" placeholder="Search document...">
          </label>
          <div class="flex flex-wrap gap-3">
            <span class="filter-chip">All</span>
            <span class="filter-chip">Contract</span>
            <span class="filter-chip">Invoice</span>
            <span class="filter-chip">Proposal</span>
            <span class="filter-chip">Others</span>
          </div>

          <section class="rounded-lg border border-[#e7ecf2] bg-white">
            <div class="flex items-center justify-between border-b border-[#e7ecf2] px-4 py-3">
              <h2 class="text-sm font-extrabold text-[#0d2a4c]">All Documents</h2>
              <span id="documents-count" class="text-xs font-semibold text-[#8aa0b5]">0 files</span>
            </div>
            <div id="documents-list" class="max-h-[420px] space-y-3 overflow-y-auto p-4 crm-scrollbar"></div>
          </section>
        </aside>

        <section class="space-y-5">
          <article id="document-featured" class="rounded-lg border border-[#e7ecf2] bg-white p-6">
            <div class="flex flex-col gap-5 md:flex-row md:items-center md:justify-between">
              <div class="flex items-center gap-4">
                <span class="grid h-16 w-16 place-items-center rounded-lg bg-[#554cff] text-white">
                  <svg viewBox="0 0 24 24" class="h-9 w-9" fill="none" aria-hidden="true"><path d="M6 3h8l4 4v14H6V3Z" stroke="currentColor" stroke-width="2"/><path d="M14 3v5h5M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </span>
                <div>
                  <h2 id="featured-file-name" class="text-xl font-extrabold text-[#0d2a4c]">No document selected</h2>
                  <p id="featured-file-meta" class="mt-1 text-sm font-medium text-[#0d2a4c]">Upload or select a document record</p>
                  <div class="mt-2 flex flex-wrap gap-2">
                    <span id="featured-file-type" class="status-badge !min-w-0 bg-[#c6edcf] text-[#2dad58]">Document</span>
                    <span class="status-badge !min-w-0 bg-[#eeecff] text-[#554cff]">Verified</span>
                  </div>
                </div>
              </div>
              <a id="featured-download" class="btn-primary" href="#" role="button">Download</a>
            </div>
            <div class="mt-8 grid grid-cols-1 overflow-hidden rounded-lg border border-[#e7ecf2] text-xs md:grid-cols-3">
              <div class="border-b border-[#e7ecf2] p-3 md:border-b-0 md:border-r"><p class="text-[#8aa0b5]">Client</p><p id="featured-client" class="mt-1 font-bold text-[#0d2a4c]">-</p></div>
              <div class="border-b border-[#e7ecf2] p-3 md:border-b-0 md:border-r"><p class="text-[#8aa0b5]">Contract</p><p id="featured-contract" class="mt-1 font-bold text-[#0d2a4c]">-</p></div>
              <div class="p-3"><p class="text-[#8aa0b5]">Upload Date</p><p id="featured-date" class="mt-1 font-bold text-[#0d2a4c]">-</p></div>
            </div>
          </article>

          <section id="document-form-card" class="rounded-lg border border-[#e7ecf2] bg-white p-6">
            <h2 class="text-base font-extrabold text-black">Add document</h2>
            <form id="document-form" class="mt-5 grid grid-cols-1 gap-4 md:grid-cols-2">
              <div>
                <label class="crm-label required" for="client_id">Client</label>
                <select id="client_id" class="crm-input" name="client_id" required></select>
              </div>
              <div>
                <label class="crm-label required" for="contract_id">Contract</label>
                <select id="contract_id" class="crm-input" name="contract_id" required></select>
              </div>
              <div>
                <label class="crm-label required" for="document_type">Document type</label>
                <input id="document_type" class="crm-input" name="document_type" type="text" placeholder="Contract, invoice, proposal" required>
              </div>
              <div>
                <label class="crm-label" for="file_input">Select file</label>
                <input id="file_input" class="crm-input" type="file">
              </div>
              <div>
                <label class="crm-label required" for="file_name">File name</label>
                <input id="file_name" class="crm-input" name="file_name" type="text" required>
              </div>
              <div>
                <label class="crm-label required" for="file_path">File path</label>
                <input id="file_path" class="crm-input" name="file_path" type="text" required>
              </div>
              <div class="md:col-span-2 flex justify-end">
                <button class="btn-primary" type="submit">Save document</button>
              </div>
            </form>
          </section>

          <section class="rounded-lg border border-[#e7ecf2] bg-white">
            <div class="border-b border-[#e7ecf2] px-5 py-4">
              <h2 class="text-base font-extrabold text-black">Document Library</h2>
            </div>
            <div class="overflow-x-auto crm-scrollbar">
              <table class="crm-table">
                <thead>
                  <tr>
                    <th>File</th>
                    <th>Type</th>
                    <th>Client</th>
                    <th>Uploaded</th>
                    <th class="text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="documents-body"></tbody>
              </table>
            </div>
          </section>
        </section>
      </div>
    </section>
    <script type="module" src="js/document.js"></script>
  </body>
</html>
