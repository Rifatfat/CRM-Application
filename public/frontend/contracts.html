<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals | CRM ISP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <section id="page-content">
      <section class="rounded-lg border border-[#e7ecf2] bg-white">
        <div class="flex flex-col gap-4 border-b border-[#e7ecf2] p-4 md:flex-row md:items-center md:justify-between">
          <div class="flex flex-1 flex-col gap-3 md:flex-row md:items-center">
            <label class="relative w-full md:max-w-sm">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#b5c0ca]">
                <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </span>
              <input id="contract-search" class="crm-input !min-h-10 !rounded-lg !border-[#e0e5ec] !pl-10" type="search" placeholder="Search deal...">
            </label>
            <select id="contract-status-filter" class="crm-input !min-h-10 !w-auto !rounded-lg !border-[#e0e5ec] !px-4">
              <option value="all">All</option>
              <option value="active">In Progress</option>
              <option value="pending">Pending</option>
              <option value="inactive">Completed</option>
              <option value="expired">Expired</option>
            </select>
          </div>
          <div class="flex items-center gap-3 text-xs font-semibold text-[#8aa0b5]">
            <span id="contracts-total">Total: 0 Deals</span>
            <span class="hidden h-8 w-px bg-[#e7ecf2] md:block"></span>
            <span class="text-[#0d2a4c]">Sort by: Date Created</span>
          </div>
        </div>

        <div class="overflow-x-auto crm-scrollbar">
          <table class="crm-table">
            <thead>
              <tr>
                <th>Client Name</th>
                <th>Deal</th>
                <th>Created - Deadline</th>
                <th>Contract Value</th>
                <th>Status</th>
                <th class="text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="contracts-body"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-5 py-4 text-xs font-medium text-[#8aa0b5]">
          <span id="contracts-showing">Showing 0 deals</span>
          <div class="flex items-center gap-2 text-[#554cff]">
            <span>&lt;</span><span class="rounded border border-[#e7ecf2] px-2 py-1 text-[#0d2a4c]">1</span><span>&gt;</span>
          </div>
        </div>
      </section>
    </section>
    <script type="module" src="js/contract.js"></script>
  </body>
</html>
